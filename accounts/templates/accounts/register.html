<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Medicare UK</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body class="auth-body">
<div class="auth-card" style="max-width:520px;">
  <div class="auth-logo">
    <div class="auth-logo-mark">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
    </div>
    <div>
      <div class="auth-logo-name">Medicare UK</div>
      <div class="auth-logo-sub">Healthcare Nursing Management</div>
    </div>
  </div>
  <div class="auth-title">Create account</div>
  <div class="auth-sub" style="margin-bottom:20px;">Register to access the platform</div>

  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      {% for field in form %}
      <div class="fg {% if field.name == 'password1' or field.name == 'password2' or field.name == 'skills' %}full{% endif %}">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span style="color:var(--red);font-size:11.5px;">{{ field.errors.0 }}</span>{% endif %}
      </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-navy" style="width:100%;justify-content:center;padding:10px;margin-top:20px;">Create Account →</button>
  </form>
  <div style="text-align:center;margin-top:20px;font-size:12.5px;color:var(--text3);">
    Already have an account? <a href="{% url 'accounts:login' %}" style="color:var(--teal);text-decoration:none;font-weight:500;">Sign in</a>
  </div>
</div>
</body>
</html>
